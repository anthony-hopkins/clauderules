# LiteLLM proxy configuration — governance enforcement layer.
#
# This config registers the GovernanceGuard callback so that EVERY completion routed
# through the proxy passes the deterministic governance hooks (forced prompt injection,
# tamper-strip, override state machine, secret/output guards). See litellm/README.md.
#
# Reload after editing: restart the litellm container (docker compose restart litellm).

model_list:
  # Primary reasoning model.
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # Cheaper/faster model; also the default semantic verifier (see GOV_VERIFIER_MODEL).
  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # Register the governance callback. Path is module.attribute relative to the proxy
  # working directory (we run the proxy from /app, with guards/ on the path).
  callbacks: guards.proxy_handler_instance

  # Drop unsupported params instead of erroring, so the forced stream=False (set by the
  # guard) is always honored across providers.
  drop_params: true

general_settings:
  # The master key gates the proxy's own admin API. The UPSTREAM Anthropic key is never
  # exposed to clients — that non-exposure is what makes the proxy an unbypassable chokepoint.
  master_key: os.environ/LITELLM_MASTER_KEY

  # Redis-backed cache powers the cross-request override state machine. Without a shared
  # cache the two-key protocol degrades to per-request (fail-safe: it never grants, only
  # withholds). Configure for multi-worker / multi-replica deployments.
  # cache: true
  # cache_params:
  #   type: redis
  #   host: os.environ/REDIS_HOST
  #   port: os.environ/REDIS_PORT
  #   password: os.environ/REDIS_PASSWORD
