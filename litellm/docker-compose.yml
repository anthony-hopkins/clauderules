# Governance enforcement stack: LiteLLM proxy (chokepoint) + Redis (override state) +
# optional Open WebUI (reinforcement-only UI). Follows the deployment protocol: pinned
# images, healthchecks on stateful services, explicit network, secrets via .env only.
#
# Deploy:  docker compose up -d
# Logs:    docker compose logs -f litellm
# Status:  docker compose ps
#
# IMPORTANT: pin LITELLM_IMAGE to a real, released tag (or digest) before production use;
# the default below is a known stable tag and MUST be verified against the registry.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - governance_net

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-v1.55.8}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      GOVERNANCE_CORE_PATH: /app/governance_core.md
      GOV_FORCE_NON_STREAMING: ${GOV_FORCE_NON_STREAMING:-true}
      GOV_BLOCK_SECRETS_INPUT: ${GOV_BLOCK_SECRETS_INPUT:-true}
      GOV_BLOCK_SECRETS_OUTPUT: ${GOV_BLOCK_SECRETS_OUTPUT:-true}
      GOV_ENABLE_OVERRIDE: ${GOV_ENABLE_OVERRIDE:-true}
      GOV_OVERRIDE_PENDING_TTL: ${GOV_OVERRIDE_PENDING_TTL:-1800}
      GOV_OVERRIDE_UNLOCKED_TTL: ${GOV_OVERRIDE_UNLOCKED_TTL:-120}
      GOV_ENABLE_VERIFIER: ${GOV_ENABLE_VERIFIER:-false}
      GOV_VERIFIER_MODEL: ${GOV_VERIFIER_MODEL:-claude-haiku}
      # Make the guards package importable as `guards` from the proxy working dir.
      PYTHONPATH: /app
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./governance_core.md:/app/governance_core.md:ro
      - ./guards:/app/guards:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "litellm", "--health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "4000:4000"
    networks:
      - governance_net

  # Optional reinforcement UI. Filters here are UX-only and BYPASSABLE (a client with the
  # proxy key can skip Open WebUI entirely) — never rely on them for enforcement.
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.5.20
    restart: unless-stopped
    depends_on:
      - litellm
    environment:
      # Point Open WebUI at the LiteLLM proxy as its OpenAI-compatible backend.
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-changeme}
    volumes:
      - openwebui_data:/app/backend/data
    ports:
      - "3000:8080"
    networks:
      - governance_net

volumes:
  redis_data:
  openwebui_data:

networks:
  governance_net:
    driver: bridge
